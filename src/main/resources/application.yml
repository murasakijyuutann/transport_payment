spring:
  application:
    name: transport-payment-system
  
  # Database Configuration (local PostgreSQL — run: docker-compose up -d)
  datasource:
    url: jdbc:postgresql://localhost:5432/transportdb
    driver-class-name: org.postgresql.Driver
    username: transport_user
    password: your_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # JPA Configuration — schema owned by Flyway, not Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Flyway — runs V1__initial_schema.sql then V2__seed_data.sql on first start
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis Configuration (local — run: docker-compose up -d)
  data:
    redis:
      host: localhost
      port: 6379
  
  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  
  # Security (disabled for now - will be implemented in Step 4)
  # security:
  #   user:
  #     name: admin
  #     password: admin123

# Server Configuration
server:
  port: 8083
  error:
    include-message: always
    include-binding-errors: always

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application Specific Properties
transport:
  payment:
    max-journey-duration-hours: 4
    incomplete-journey-penalty: 5.00
    daily-cap-amount: 15.00
    base-fare: 2.50
    per-zone-charge: 1.50

# JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000  # 24 hours in milliseconds